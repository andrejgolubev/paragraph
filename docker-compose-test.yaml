# docker-compose-lite.yaml с другими портами (+1) для автотестов (pytest) 
services:
  pg_test:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5435:5432" # локальный порт:порт контейнера
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - pg-test-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - test

  redis_test:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6381:6379"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS__PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS__PASSWORD}
    volumes:
      - redis-test-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - test

networks:
  test:
    driver: bridge

volumes:
  pg-test-data:
  redis-test-data: