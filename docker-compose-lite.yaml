# Фактически урезенная версия docker-compose.yaml для тестирования без
# запуска всего стека (не запускать вместе с docker-compose.yaml)
services:
  pg_lite:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5434:5432" # локальный порт:порт контейнера
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    volumes:
      - pg-lite-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - lite

  redis_lite:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS__PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS__PASSWORD}
    volumes:
      - redis-lite-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - lite

networks:
  lite:
    driver: bridge

volumes:
  pg-lite-data:
  redis-lite-data: