services:
  backend: 
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"
    build: 
      context: backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS__HOST: redis
      REDIS__PORT: 6379
      DB__HOST: db
      DB__PORT: 5432
    volumes:
      - ./backend-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - custom
  db:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      POSTGRES_DB: ${DB__NAME}
      # Оптимизация для продакшена:
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WORK_MEM: 6MB
      POSTGRES_MAX_CONNECTIONS: "100"
    ports:
      - "5434:5432" # локальный порт:порт контейнера
    volumes:
      - db-data:/data
    networks:
      - custom
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS__PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS__PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - custom
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  custom:
    driver: bridge

volumes:
  db-data:
  redis-data:
  backend-data:
