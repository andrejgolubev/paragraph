services:
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - custom

  nginx: 
    image: nginx:stable-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./site:/var/www/html/site
    networks:
      - custom

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - pg
    environment:
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - custom
      
  frontend: 
    depends_on:
      - backend 
    ports: 
      - "3000"
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - custom
        
  backend: 
    depends_on:
      pg: 
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000" # доступ вне докер-сети только локально
    restart: unless-stopped
    build: 
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS__HOST: redis
      REDIS__PORT: 6379
      DB__HOST: pg
      DB__PORT: 5432
    volumes:
      - ./backend/chrome-linux64.zip:/backend/chrome-linux64.zip:ro
      - ./backend/chromedriver-linux64.zip:/backend/chromedriver-linux64.zip:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - custom
  pg:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432" # локальный порт:порт контейнера
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      # Оптимизация для продакшена:
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WORK_MEM: 6MB
      POSTGRES_MAX_CONNECTIONS: "100"
    volumes:
      - pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - custom

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS__PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS__PASSWORD}
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - custom

networks:
  custom:
    driver: bridge

volumes:
  pg-data:
  redis-data:
