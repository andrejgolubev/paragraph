services:
  backend: 
    depends_on:
      pg: 
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    build: 
      context: backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      REDIS__HOST: redis
      REDIS__PORT: 6379
      DB__HOST: pg
      DB__PORT: 5432
    volumes:
      - ./backend/chrome-linux64.zip:/backend/chrome-linux64.zip:ro
      - ./backend/chromebrowser-linux64.zip:/backend/chromebrowser-linux64.zip:ro
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - custom
  pg:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      # Оптимизация для продакшена:
      POSTGRES_SHARED_BUFFERS: 128MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 512MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_WORK_MEM: 6MB
      POSTGRES_MAX_CONNECTIONS: "100"
    ports:
      - "5434:5432" # локальный порт:порт контейнера
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - custom
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS__PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS__PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - custom
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  custom:
    driver: bridge

volumes:
  pg-data:
  redis-data:
