services:
  db:
    container_name: "db"
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=pg
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=pg
    ports:
      - "5433:5432" #ПОРТ_ОС(куда я делаю запрос):ПОРТ_КОНТЕЙНЕРА
    networks:
      - custom
  db_test:
    container_name: "db_test"
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=pg_test
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=pg_test
    ports:
      - "5434:5432" #ПОРТ_ОС(куда я делаю запрос):ПОРТ_КОНТЕЙНЕРА
    networks:
      - custom
networks:
  custom:
    driver: bridge
