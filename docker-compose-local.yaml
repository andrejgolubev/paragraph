services:
  db:
    container_name: "db"
    image: postgres:17
    restart: always
    environment:
      - POSTGRES_USER=pg
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=pg
    ports:
      - "5434:5432" #ПОРТ_ОС(куда я делаю запрос):ПОРТ_КОНТЕЙНЕРА
    networks:
      - custom

networks:
  custom:
    driver: bridge
