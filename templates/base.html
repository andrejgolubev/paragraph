<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {% endblock title %}</title>
    <link
      href="{{ url_for('static', path='../static/sass/styles.css') }}"
      rel="stylesheet"
    />
  </head>

  <header class="header">
    <nav class="nav">
      <ul class="nav_list">
        <li class="nav_item">
          <a href="{{url_for('index')}}">
            <img
              class="nav_logo"
              src="../static/static/logoAndText.svg"
              alt="Logo"
            />
          </a>
        </li>
        <div class="links">
          <li class="nav_item"><a href="#">журнал</a></li>
          <li class="nav_item"><a href="#">рейтинг</a></li>
          <li class="nav_item"><a href="#">новости</a></li>

          <div class="toggle">
            <img
              id="toggle-bg"
              src="../static/static/toggle-bg.svg"
              alt="Toggle"
            />
          </div>
          <img
            id="toggle-sun"
            src="../static/static/toggle-sun.svg"
            alt="Toggle"
          />
          <img
            src="../static/static/ProfileIcon.svg"
            alt="Profile"
            class="profile-icon nav_item"
          />
        </div>
      </ul>
    </nav>
  </header>

  <body>
    {% block body %} {% endblock body %}

    <script src="../static/js/homepage.js" type="module"></script>
    <script src="../static/js/loadSchedule.js" type="module"></script>
    <script src="../static/js/groupsDropdown.js" type="module"></script>
    <script src="../static/js/datesDropdown.js" type="module"></script>
    <script src="../static/js/dialog.js" type="module"></script>
    <script src="../static/js/authorization.js" type="module"></script>
  </body>
</html>
