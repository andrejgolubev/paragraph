{% extends "base.html" %}

{% block title %}
прогинж | журнал
{% endblock title %}


<body>
{% block body %}
  <div class="main-content">
    <div class="options">
      <div class="group">
        <div class="custom-select">
          <select>
            <option value="" disabled selected>номер группы</option>
            {% for group in groups %}
            <a href="{{url_for('index')}}"></a><option value="{{group.data_value}}">{{group.group_number}}</option></a>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="week">
        <div class="custom-select">
          <select>
            <option value="" disabled selected>дата / неделя</option>
            {% for date in dates%}
            <option value="{{date.data_value}}">{{date.date}}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="corpuses">
        <p>C - Центральный корпус⠀⠀⠀⠀B - Бизнес-инкубатор</p>
        <p>L - Лабораторный корпус ⠀⠀⠀F - Первый корпус</p>
      </div>
    </div>
    {% if HOMEPAGE_ON %}
    {% include "includes/tip.html" %}
    {% endif %}
  </div>


{% endblock body %}
</body>
</html>
