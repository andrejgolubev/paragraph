name: Deploy to VPS

on: 
  # push:
  #   branches:
  #     - main
  workflow_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
      SSH_PORT: ${{ secrets.VPS_SSH_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.6.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Ensure remote app directory exists
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no"
          if [ -n "$SSH_PORT" ]; then
            SSH_CMD="$SSH_CMD -p $SSH_PORT"
          fi
          $SSH_CMD "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_APP_PATH'"

      - name: Sync sources to VPS
        run: |
          RSYNC_SSH="ssh -o StrictHostKeyChecking=no"
          if [ -n "$SSH_PORT" ]; then
            RSYNC_SSH="$RSYNC_SSH -p $SSH_PORT"
          fi
          rsync -az \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'backend/.venv' \
            --exclude '*.pyc' \
            --exclude '__pycache__' \
            -e "$RSYNC_SSH" ./ "$VPS_USER@$VPS_HOST:$VPS_APP_PATH"

      - name: Rebuild containers on VPS
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no"
          if [ -n "$SSH_PORT" ]; then
            SSH_CMD="$SSH_CMD -p $SSH_PORT"
          fi
          $SSH_CMD "$VPS_USER@$VPS_HOST" <<'EOF'
          cd "$VPS_APP_PATH"
          docker compose down --remove-orphans --timeout 20 || true
          docker compose up -d --build
          EOF

